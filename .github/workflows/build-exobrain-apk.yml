name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web deps & build
        run: |
          npm install
          npx vite build

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/share --save

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK (debug)
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk release/exobrain-v1.0.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/debug/app-debug.apk release/exobrain-v1.0-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exobrain-apk
          path: release/

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Exobrain v1.0.${{ github.run_number }}"
          body: |
            ## Exobrain Mobile APK

            AI-powered mathematical paper editor for Android/HarmonyOS.

            ### Modes
            - 🔑 **Self-Hosted**: Bring your own DeepSeek API key
            - ☁️ **SaaS**: Connect to emergence.science (SymPy verification, RAG, cloud storage)

            ### Install
            1. Download the APK
            2. Enable "Install from unknown sources" on your device
            3. Open and start writing papers

            Built from commit ${{ github.sha }}.
          files: release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
