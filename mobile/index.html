<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Exobrain</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); }
    :root, [data-theme="dark"] {
      --bg: #000; --bg-secondary: #0a0a0a; --bg-tertiary: #1a1a1a;
      --fg: #e0e0e0; --fg-secondary: #888; --fg-tertiary: #555;
      --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.15);
      --accent-purple: #a855f7; --accent-cyan: #06b6d4;
      --chat-user-bg: rgba(168,85,247,0.2); --chat-user-border: rgba(168,85,247,0.3);
      --chat-ai-bg: rgba(255,255,255,0.05); --chat-ai-border: rgba(255,255,255,0.1);
      --header-bg: rgba(0,0,0,0.9); --tab-bg: rgba(0,0,0,0.95);
      --input-bg: rgba(255,255,255,0.05); --btn-disabled: #333;
      --gradient-text: linear-gradient(135deg, #a855f7, #06b6d4);
    }
    [data-theme="light"] {
      --bg: #f5f5f5; --bg-secondary: #fff; --bg-tertiary: #eee;
      --fg: #222; --fg-secondary: #555; --fg-tertiary: #999;
      --border: rgba(0,0,0,0.1); --border-hover: rgba(0,0,0,0.2);
      --accent-purple: #7c3aed; --accent-cyan: #0891b2;
      --chat-user-bg: rgba(124,58,237,0.1); --chat-user-border: rgba(124,58,237,0.3);
      --chat-ai-bg: rgba(0,0,0,0.03); --chat-ai-border: rgba(0,0,0,0.1);
      --header-bg: rgba(255,255,255,0.9); --tab-bg: rgba(255,255,255,0.95);
      --input-bg: rgba(0,0,0,0.03); --btn-disabled: #ccc;
      --gradient-text: linear-gradient(135deg, #7c3aed, #0891b2);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
